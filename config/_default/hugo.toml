baseURL = "https://solvaholic.com/"
locale = "en-us"
title = "solvaholic"
theme = ["github.com/adityatelange/hugo-PaperMod"]
enableRobotsTXT = true
enableEmoji = true
pagination.pagerSize = 10

# Match Jekyll's default permalink so old links keep working.
[permalinks]
  posts = "/:year/:month/:day/:slug/"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "github-dark"
    lineNos = false
