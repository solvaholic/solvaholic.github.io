env = "production"
description = "Projects and writing by @solvaholic."
author = "solvaholic"
defaultTheme = "auto"           # honors prefers-color-scheme
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowRssButtonInSectionTermList = true
ShowToc = false
comments = false

# Drive what appears under the home info block. With "projects" only,
# the home page features projects; posts remain at /posts/.
mainSections = ["projects"]

[homeInfoParams]
  Title = "Hi, I'm @solvaholic 👋"
  Content = """
I build small, useful things and write about how they came together.
Below: what I'm working on. Looking for writing instead? Head to
[/posts/](/posts/).
"""

[[socialIcons]]
  name = "github"
  url = "https://github.com/solvaholic"

[[socialIcons]]
  name = "rss"
  url = "/posts/index.xml"

[assets]
  disableHLJS = true
  favicon = "/favicon.ico"
